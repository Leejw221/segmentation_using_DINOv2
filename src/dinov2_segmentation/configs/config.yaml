# DINOv2 Segmentation Configuration

model:
  num_classes: 150  # ADE20K has 150 classes (0-149, excluding background)
  model_name: "facebook/dinov2-base"  # DINOv2 model variant
  freeze_backbone: true  # Freeze DINOv2 backbone, only train segmentation head

training:
  batch_size: 16  # Same as paper
  learning_rate: 0.01  # Paper uses 0.01 for linear evaluation (100x higher)
  num_epochs: 160  # Paper uses 160 epochs (was 100)
  image_size: 518  # Paper uses 518x518 (was 224)
  num_workers: 4  # DataLoader workers
  
  # Optimizer settings (following paper)
  optimizer: "sgd"  # Paper uses SGD (was Adam by default)
  momentum: 0.9     # SGD momentum
  weight_decay: 0.0 # No weight decay for linear evaluation
  
  # Learning rate schedule (following paper)
  scheduler: "polynomial"  # Polynomial decay
  power: 1.0              # Linear decay
  
  # Data augmentation (simplified to match paper)
  augmentation:
    horizontal_flip: 0.5    # Keep this
    multi_scale_crop: true  # Add multi-scale crop like paper
    crop_size: 518         # Crop to 518x518
    # Remove other augmentations to match paper exactly

loss:
  use_dice: false  # Whether to use dice loss in addition to CrossEntropy
  dice_weight: 1.0  # Weight for dice loss if enabled
  
# Inference settings
inference:
  visualization_alpha: 0.6  # Transparency for segmentation overlay
  confidence_threshold: 0.5  # Confidence threshold for visualization
  
# ROS2 specific settings
ros2:
  auto_demo: true  # Enable automatic demo with sample images
  demo_interval: 5.0  # Interval between demo images (seconds)
  
# Dataset paths (to be specified when running)
data:
  ade20k_root: ""  # Path to ADE20K dataset root directory
  
# Output directories
output:
  checkpoints_dir: "models/checkpoints"
  logs_dir: "logs"
  visualizations_dir: "outputs/visualizations"